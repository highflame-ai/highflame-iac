fullnameOverride: "highflame-collector"

livenessProbe:
  httpGet:
    path: /
    port: 13133
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 2

readinessProbe:
  httpGet:
    path: /
    port: 13133
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 2

nodeSelector:
  kube/nodegroup: "general"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

service:
  type: NodePort
  ports:
    - name: otlp-grpc
      port: 4317
    - name: otlp-http
      port: 4318
    - name: metrics
      port: 8888
    - name: healthz
      port: 13133

image:
  repository: "${DOCKER_IMAGE}"
  pullPolicy: Always
  tag: ${IMAGE_TAG}

imagePullSecrets:
  - name: highflame-registry-secret

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1024Mi
    cpu: 200m

secrets:
  enabled: true
  secretData:
    # Please refer https://github.com/highflame-ai/highflame-iac/blob/main/docs/service-vars.md

ingresses:
  enabled: true
  items:
    - name: http
      className: "alb"
      servicePort: 4318
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/healthcheck-protocol: HTTP 
        alb.ingress.kubernetes.io/healthcheck-port: '13133'
        alb.ingress.kubernetes.io/healthcheck-path: /healthz
        alb.ingress.kubernetes.io/target-type: instance
        alb.ingress.kubernetes.io/ssl-redirect: '443'
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
        alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
        alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
        alb.ingress.kubernetes.io/healthy-threshold-count: '2'
        alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
        alb.ingress.kubernetes.io/success-codes: '200'
        alb.ingress.kubernetes.io/group.order: '2'
        alb.ingress.kubernetes.io/load-balancer-attributes: "idle_timeout.timeout_seconds=300"

        alb.ingress.kubernetes.io/load-balancer-name: ${K8S_CLUSTER_NAME}-alb-ingress
        alb.ingress.kubernetes.io/group.name: ${K8S_CLUSTER_NAME}-group
        alb.ingress.kubernetes.io/subnets: ${PUBLIC_SUBNET_IDS}
        alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERTIFICATE_ARN}
        alb.ingress.kubernetes.io/security-groups: ${ALB_SECURITY_GROUP_IDS}
      hosts:
        - host: otel-http.api.example.com
          paths:
            - path: /
              pathType: Prefix
    - name: grpc
      className: "alb"
      servicePort: 4317
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
        alb.ingress.kubernetes.io/healthcheck-path: /
        alb.ingress.kubernetes.io/backend-protocol-version: GRPC
        alb.ingress.kubernetes.io/target-type: instance
        alb.ingress.kubernetes.io/ssl-redirect: '443'
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
        alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
        alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
        alb.ingress.kubernetes.io/healthy-threshold-count: '2'
        alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
        alb.ingress.kubernetes.io/group.order: '2'
        alb.ingress.kubernetes.io/load-balancer-attributes: "idle_timeout.timeout_seconds=300"

        alb.ingress.kubernetes.io/load-balancer-name: ${K8S_CLUSTER_NAME}-alb-ingress
        alb.ingress.kubernetes.io/group.name: ${K8S_CLUSTER_NAME}-group
        alb.ingress.kubernetes.io/subnets: ${PUBLIC_SUBNET_IDS}
        alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERTIFICATE_ARN}
        alb.ingress.kubernetes.io/security-groups: ${ALB_SECURITY_GROUP_IDS}
      hosts:
        - host: otel-grpc.api.example.com
          paths:
            - path: /
              pathType: Prefix
